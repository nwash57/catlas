<app-auth-shell eyebrow="Welcome back" heading="Sign in to Catlas">
  <ng-container slot="subhead">Pick up where you left off with your colony.</ng-container>

  <form (submit)="submit($event)" class="space-y-5">
    <label class="block">
      <span class="text-sm font-medium text-stone-700">Email</span>
      <input
        type="email"
        autocomplete="email"
        required
        [ngModel]="email()"
        (ngModelChange)="email.set($event)"
        name="email"
        class="mt-1 w-full rounded-md border border-stone-300 bg-white px-3 py-2 text-stone-900 shadow-sm transition focus:border-stone-900 focus:outline-none focus:ring-2 focus:ring-stone-900/10"
      />
    </label>
    <label class="block">
      <span class="text-sm font-medium text-stone-700">Password</span>
      <input
        type="password"
        autocomplete="current-password"
        required
        minlength="6"
        [ngModel]="password()"
        (ngModelChange)="password.set($event)"
        name="password"
        class="mt-1 w-full rounded-md border border-stone-300 bg-white px-3 py-2 text-stone-900 shadow-sm transition focus:border-stone-900 focus:outline-none focus:ring-2 focus:ring-stone-900/10"
      />
    </label>

    @if (errorMessage(); as msg) {
      <p class="rounded-md border border-red-200 bg-red-50 px-3 py-2 text-sm text-red-800">
        {{ msg }}
      </p>
    }

    <button
      type="submit"
      [disabled]="submitting()"
      class="w-full rounded-full bg-stone-900 px-6 py-3 text-sm font-medium text-stone-50 transition hover:bg-stone-700 disabled:cursor-not-allowed disabled:opacity-60"
    >
      {{ submitting() ? 'Signing in…' : 'Sign in' }}
    </button>
  </form>

  <p class="mt-6 text-sm text-stone-600">
    New here?
    <a routerLink="/auth/sign-up" class="font-medium text-stone-900 underline-offset-4 hover:underline">
      Create an account
    </a>
    .
  </p>
</app-auth-shell>
