<div class="min-h-dvh bg-stone-50 text-stone-900 antialiased dark:bg-stone-950 dark:text-stone-50">
  <header class="mx-auto flex max-w-6xl items-center justify-between px-6 py-5">
    <div class="flex items-center gap-6">
      <a routerLink="/" class="font-serif text-xl font-semibold tracking-tight text-stone-900 dark:text-stone-50">Catlas</a>
      <nav class="flex items-center gap-5 text-sm">
        <a routerLink="/map" class="text-stone-600 transition hover:text-stone-900 dark:text-stone-400 dark:hover:text-stone-50">Map</a>
        <a routerLink="/learn" class="text-stone-600 transition hover:text-stone-900 dark:text-stone-400 dark:hover:text-stone-50">Learn</a>
        <a routerLink="/clinics" class="text-stone-600 transition hover:text-stone-900 dark:text-stone-400 dark:hover:text-stone-50">Clinics</a>
      </nav>
    </div>
    <div class="flex items-center gap-4 text-sm">
      @if (currentUser()) {
        <button type="button" (click)="signOut()" class="text-stone-600 transition hover:text-stone-900 dark:text-stone-400 dark:hover:text-stone-50">Sign out</button>
        <a
          routerLink="/dashboard"
          class="rounded-full bg-stone-900 px-4 py-2 font-medium text-stone-50 transition hover:bg-stone-700 dark:bg-stone-100 dark:text-stone-900 dark:hover:bg-stone-200"
        >
          Dashboard
        </a>
      } @else {
        <a routerLink="/auth/sign-in" [queryParams]="{ returnUrl: router.url }" class="text-stone-600 transition hover:text-stone-900 dark:text-stone-400 dark:hover:text-stone-50">Sign in</a>
        <a
          routerLink="/auth/sign-up"
          class="rounded-full bg-stone-900 px-4 py-2 font-medium text-stone-50 transition hover:bg-stone-700 dark:bg-stone-100 dark:text-stone-900 dark:hover:bg-stone-200"
        >
          Get started
        </a>
      }
      <app-theme-toggle />
    </div>
  </header>

  <div class="mx-auto max-w-6xl px-6 py-12 md:flex md:gap-16">
    <aside class="mb-10 shrink-0 md:mb-0 md:w-52">
      <p class="mb-4 font-mono text-xs tracking-[0.2em] text-amber-700 uppercase dark:text-amber-500">Learn</p>
      <nav class="flex flex-col gap-1 text-sm">
        <a
          routerLink="/learn/what-is-tnr"
          routerLinkActive="font-semibold text-stone-900 dark:text-stone-50"
          class="rounded px-2 py-1.5 text-stone-600 transition hover:bg-stone-100 hover:text-stone-900 dark:text-stone-400 dark:hover:bg-stone-800 dark:hover:text-stone-50"
        >
          What is TNR?
        </a>
        <a
          routerLink="/learn/why-tnr-works"
          routerLinkActive="font-semibold text-stone-900 dark:text-stone-50"
          class="rounded px-2 py-1.5 text-stone-600 transition hover:bg-stone-100 hover:text-stone-900 dark:text-stone-400 dark:hover:bg-stone-800 dark:hover:text-stone-50"
        >
          Why TNR works
        </a>
        <a
          routerLink="/learn/how-to-start"
          routerLinkActive="font-semibold text-stone-900 dark:text-stone-50"
          class="rounded px-2 py-1.5 text-stone-600 transition hover:bg-stone-100 hover:text-stone-900 dark:text-stone-400 dark:hover:bg-stone-800 dark:hover:text-stone-50"
        >
          How to start
        </a>
        <a
          routerLink="/learn/how-to-help"
          routerLinkActive="font-semibold text-stone-900 dark:text-stone-50"
          class="rounded px-2 py-1.5 text-stone-600 transition hover:bg-stone-100 hover:text-stone-900 dark:text-stone-400 dark:hover:bg-stone-800 dark:hover:text-stone-50"
        >
          How to help without trapping
        </a>
      </nav>
    </aside>

    <main class="min-w-0 flex-1">
      <router-outlet />
    </main>
  </div>

  <footer class="border-t border-stone-200 dark:border-stone-800">
    <div
      class="mx-auto flex max-w-6xl flex-col gap-3 px-6 py-10 text-sm text-stone-500 sm:flex-row sm:items-center sm:justify-between"
    >
      <p>&copy; {{ 2026 }} Catlas. Built by caretakers.</p>
      <nav class="flex gap-6">
        <a routerLink="/learn" class="transition hover:text-stone-900 dark:hover:text-stone-50">Learn</a>
        <a routerLink="/clinics" class="transition hover:text-stone-900 dark:hover:text-stone-50">Clinics</a>
        <a routerLink="/privacy" class="transition hover:text-stone-900 dark:hover:text-stone-50">Privacy</a>
      </nav>
    </div>
  </footer>
</div>
